# OpenWrt 25.12.1 完整版编译配置（含Web+常用插件，适配虚拟机）
name: Build OpenWrt 25.12.1 Full Version (With Web & Plugins)

on:
  workflow_dispatch:  # 仅手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装完整编译依赖（适配25.12.1）
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget \
          libelf-dev libffi-dev liblzma-dev libzstd-dev pkg-config

      # 拉取25.12.1官方源码
      - name: Clone OpenWrt 25.12.1 Source
        run: |
          git clone --depth=1 -b openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 核心配置：含Web访问+常用插件（无高风险第三方插件）
      - name: Configure OpenWrt
        run: |
          cd openwrt
          cat > .config <<EOF
          # 架构适配（x86_64虚拟机）
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y

          # 镜像格式（PVE/ESXi/VMware适配）
          CONFIG_TARGET_IMAGES_GRUB_EFI=y
          CONFIG_TARGET_IMAGES_VMDK=y
          CONFIG_TARGET_IMAGES_VDI=y

          # ========== 核心Web服务（必选，解决访问问题） ==========
          CONFIG_PACKAGE_uhttpd=y          # Web服务核心
          CONFIG_PACKAGE_luci=y            # LuCI网页后台
          CONFIG_PACKAGE_luci-base=y       # LuCI基础组件
          CONFIG_PACKAGE_luci-mod-admin-full=y  # LuCI完整管理模块
          CONFIG_LUCI_LANG_zh_Hans=y       # 中文界面
          CONFIG_LUCI_THEME_ARGON=y        # 美观的Argon主题

          # ========== 常用基础插件（稳定无冲突） ==========
          # 系统工具
          CONFIG_PACKAGE_luci-app-ttyd=y           # 网页终端
          CONFIG_PACKAGE_luci-app-filetransfer=y   # 文件传输
          CONFIG_PACKAGE_luci-app-autoreboot=y     # 自动重启
          CONFIG_PACKAGE_luci-app-diskman=y        # 磁盘管理
          CONFIG_PACKAGE_htop=y                    # 系统监控
          CONFIG_PACKAGE_openssh-sftp-server=y     # SFTP文件传输

          # 网络工具
          CONFIG_PACKAGE_luci-app-sqm=y            # 网络优化
          CONFIG_PACKAGE_luci-app-upnp=y           # UPnP端口映射
          CONFIG_PACKAGE_luci-app-ddns=y           # 动态域名
          CONFIG_PACKAGE_luci-app-wol=y            # 网络唤醒
          CONFIG_PACKAGE_luci-app-firewall=y       # 防火墙
          CONFIG_PACKAGE_dnsmasq-full=y            # DNS服务
          CONFIG_PACKAGE_ipv6helper=y              # IPv6支持

          # 存储工具
          CONFIG_PACKAGE_luci-app-samba4=y         # 局域网共享
          CONFIG_PACKAGE_kmod-usb2=y               # USB2.0驱动
          CONFIG_PACKAGE_kmod-usb3=y               # USB3.0驱动
          CONFIG_PACKAGE_kmod-fs-ext4=y            # EXT4文件系统
          CONFIG_PACKAGE_kmod-fs-ntfs=y            # NTFS文件系统

          # ========== 内核基础配置 ==========
          CONFIG_KERNEL_64BIT=y
          CONFIG_KERNEL_MODULES=y
          CONFIG_KERNEL_FAT_DEFAULT_IOCHARSET="utf8"
          EOF
          # 自动补全依赖（关键）
          make defconfig

      # 单线程下载工具链（避免损坏）
      - name: Download Tools
        run: |
          cd openwrt
          make download -j1 V=s
          find dl -size -1024c -delete

      # 单线程编译（稳定优先）
      - name: Build OpenWrt
        run: |
          cd openwrt
          make clean
          make -j1 V=s

      # 上传固件（方便下载）
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12.1-full-x86_64
          path: openwrt/bin/targets/x86/64/
          retention-days: 30

      # 上传到Releases（长期保存）
      - name: Upload to Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: openwrt/bin/targets/x86/64/*.img.gz
          tag_name: openwrt-25.12.1-full-${{ github.run_id }}
          name: OpenWrt 25.12.1 Full Version ${{ github.run_id }}
          body: "OpenWrt 25.12.1 完整版（含Web访问+常用插件，适配虚拟机）"
