# OpenWrt x86_64 编译配置（适配 PVE/ESXi）
name: Build OpenWrt x86_64 for PVE/ESXi

# 触发条件：仅手动触发（避免误触发消耗额度）
on:
  workflow_dispatch:

# 权限配置
permissions:
  contents: write

# 编译任务（增加超时保护）
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360  # 延长超时时间（默认3小时，编译OpenWrt足够）
    steps:
      # 步骤 1：检查代码
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤 2：安装编译依赖（完整无遗漏）
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib \
          git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 \
          python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo \
          uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt --fix-broken install -y
          # 补充插件依赖（避免编译报错）
          sudo apt install -y libffi-dev libpq-dev

      # 步骤 3：拉取 Lean 源码 + 加速（使用缓存）
      - name: Clone OpenWrt Source
        uses: actions/cache@v4  # 缓存源码，下次编译更快
        with:
          path: openwrt
          key: ${{ runner.os }}-openwrt-source
        run: |
          if [ ! -d "openwrt" ]; then
            git clone https://github.com/coolsnowwolf/lede.git openwrt
            cd openwrt
            ./scripts/feeds update -a
            ./scripts/feeds install -a
          else
            cd openwrt
            git pull
            ./scripts/feeds update -a
            ./scripts/feeds install -a
          fi

      # 步骤 4：配置编译选项（核心，修复重复/无用配置）
      - name: Configure OpenWrt
        run: |
          cd openwrt
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          # 镜像格式（PVE/ESXi 优化）
          CONFIG_TARGET_IMAGES_GRUB_EFI=y
          CONFIG_TARGET_IMAGES_VMDK=y
          CONFIG_TARGET_IMAGES_VDI=y
          CONFIG_TARGET_IMAGES_ISO=n  # 虚拟机无需ISO，关闭减少体积
          CONFIG_TARGET_IMAGES_VHD=n
          # 基础 Web 界面
          CONFIG_LUCI=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_LUCI_THEME_ARGON=y
          CONFIG_LUCI_THEME_BOOTSTRAP=y
          # 核心插件（去重 + 补全依赖）
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-sqm=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-unblockmusic=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-accesscontrol=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_btrfs_progs=y
          CONFIG_PACKAGE_luci-app-diskman_INCLUDE_lsblk=y
          CONFIG_PACKAGE_luci-app-filetransfer=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-ramfree=y
          CONFIG_PACKAGE_luci-app-rclone_INCLUDE_rclone-webui=y
          CONFIG_PACKAGE_luci-app-rclone_INCLUDE_rclone-ng=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-app-turboacc_INCLUDE_OFFLOADING=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-app-ssr-plus=y
          CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Xray=y
          CONFIG_PACKAGE_luci-app-frpc=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-app-samba=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-app-vsftpd=y
          CONFIG_PACKAGE_luci-app-cifs-mount=y
          CONFIG_PACKAGE_luci-app-cifsd=y
          CONFIG_PACKAGE_luci-app-frps=y
          CONFIG_PACKAGE_luci-app-openvpn=y
          CONFIG_PACKAGE_luci-app-netdata=y
          CONFIG_PACKAGE_luci-app-v2ray-server=y
          CONFIG_PACKAGE_luci-app-adblock=y
          CONFIG_PACKAGE_luci-app-adbyby-plus=y
          CONFIG_PACKAGE_luci-app-airplay2=y
          CONFIG_PACKAGE_luci-app-aliyundrive-webdav=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-app-noddos=y
          # 系统工具
          CONFIG_PACKAGE_dnsmasq_full_dhcpv6=y
          CONFIG_PACKAGE_ipv6helper=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          # USB/存储驱动
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-storage-extras=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-ntfs=y
          EOF
          # 自动补全依赖（关键！避免插件依赖缺失报错）
          make defconfig

      # 步骤 5：下载工具链（单线程，稳定不报错）
      - name: Download Tools
        run: |
          cd openwrt
          make download -j1 V=s

      # 步骤 6：编译固件（优化线程数，适配GitHub虚拟机）
      - name: Build OpenWrt
        run: |
          cd openwrt
          # 先清理缓存（避免编译残留）
          make clean
          # 使用最优线程数（GitHub虚拟机默认2核，用-j2）
          make -j2 V=s

      # 步骤 7：上传固件到Artifacts（优先下载）
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-x86_64-firmware
          path: openwrt/bin/targets/x86/64/
          retention-days: 30  # 固件保留30天

      # 步骤 8：上传固件到Releases（长期保存）
      - name: Upload to Releases
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: openwrt/bin/targets/x86/64/*.img.gz
          tag_name: build-${{ github.run_id }}
          name: OpenWrt x86_64 Build ${{ github.run_id }}
          body: |
            OpenWrt x86_64 固件（适配PVE/ESXi）
            包含插件：SSR-Plus、AdGuardHome、Docker、Samba、TurboACC、阿里云盘WebDAV等
            编译时间：${{ github.run_at }}
