# OpenWrt 25.12.1 官方纯净版（x86_64，PVE/ESXi 专用，无报错）
name: Build OpenWrt 25.12.1 x86_64 Official

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 25.12 编译依赖（官方要求）
      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      # 拉取 25.12.1 官方源码（深度克隆，加速）
      - name: Clone OpenWrt 25.12.1
        run: |
          git clone --depth=1 -b openwrt-25.12 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          # 只更新官方 feeds，不加第三方
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 25.12.1 纯净配置（只开官方支持的功能）
      - name: Configure OpenWrt
        run: |
          cd openwrt
          cat > .config <<EOF
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_Generic=y
          # 镜像格式（PVE/ESXi 用）
          CONFIG_TARGET_IMAGES_GRUB_EFI=y
          CONFIG_TARGET_IMAGES_VMDK=y
          # 基础 LuCI（官方原生）
          CONFIG_LUCI=y
          CONFIG_LUCI_LANG_zh_Hans=y
          # 网络核心（官方必选）
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_ipv6helper=y
          # 系统工具
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          # USB/存储
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-fs-ext4=y
          # 25.12 内核
          CONFIG_KERNEL_64BIT=y
          EOF
          make defconfig

      # 单线程下载（防损坏）
      - name: Download Tools
        run: |
          cd openwrt
          make download -j1 V=s
          # 清理异常小文件
          find dl -size -1024c -delete

      # 单线程编译（稳定优先）
      - name: Build OpenWrt
        run: |
          cd openwrt
          make clean
          make -j1 V=s

      # 上传固件
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-25.12.1-x86_64-official
          path: openwrt/bin/targets/x86/64/
          retention-days: 30
